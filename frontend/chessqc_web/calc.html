<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHESS-QC — Calculator</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script src="_prefs.js"></script>
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.28.0/full/pyodide.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="apps.js"></script>
</head>
<body>
  <header>
    <a id="home" href="apps.html" class="homelink">← Applications</a>
    <a href="docs.html" class="homelink">Docs</a>
    <span class="title" id="appTitle">CHESS-QC</span>
    <span id="appArea" class="muted"></span>
    <span id="classBadge" class="badge" style="display:none"></span>
    <select id="appSelect" class="app-select" title="Switch application" aria-label="Switch application"></select>
    <span class="spacer"></span>
    <label>Units:
      <label><input type="radio" name="units" value="SI" checked> SI</label>
      <label><input type="radio" name="units" value="US"> US</label>
    </label>
    <button id="reset">Reset</button>
  </header>

  <details id="methodBox" class="method-box" style="display:none">
    <summary>
      <span class="method-title">Method &amp; Equations</span>
      <span id="methodTag"></span>
      <span class="spacer"></span>
      <button id="methodPop" type="button" title="Open in a wider window">Pop out ⤢</button>
    </summary>
    <div id="methodBody" class="method-body"></div>
  </details>

  <main class="calc-main">
    <fieldset id="inputsBox"><legend>Inputs</legend><div id="inputs"></div></fieldset>
    <div class="center"><button id="compute">▶ Compute</button></div>
    <fieldset class="results" id="resultsBox"><legend>Outputs</legend>
      <div id="workflow" class="workflow"></div>
      <div id="values"></div>
      <div class="tabs">
        <div class="tabbar">
          <button data-tab="plot" class="active">Plot</button>
          <button data-tab="table">Table</button>
        </div>
        <div class="tabpane">
          <div id="plotPane"><canvas id="plot" width="520" height="280"></canvas></div>
          <div id="tablePane" class="scrollbox" style="display:none"></div>
        </div>
      </div>
      <div style="text-align:right;margin-top:6px">
        <button id="report">Save Report</button>
        <button id="copy">Copy</button>
        <button id="csv">Export CSV</button>
        <button id="png">Save Plot</button>
        <button id="popout">Pop out ⤢</button>
      </div>
    </fieldset>
  </main>

  <div id="methodModal" class="method-modal" style="display:none">
    <div class="method-modal-bar">
      <span class="method-title">Method &amp; Equations</span>
      <span id="methodModalTag" class="muted"></span>
      <span class="spacer"></span>
      <button id="methodModalClose">Close ✕</button>
    </div>
    <div id="methodModalBody" class="method-modal-body"></div>
  </div>

  <div id="plotModal" class="plot-modal" style="display:none">
    <div class="plot-modal-bar">
      <span class="muted">scroll to zoom · drag to pan · double-click to reset</span>
      <span class="spacer"></span>
      <button id="bigReset">Reset zoom</button>
      <button id="bigPng">Save Plot</button>
      <button id="plotClose">Close ✕</button>
    </div>
    <canvas id="plotBig"></canvas>
  </div>

  <div id="status">loading…</div>
  <div id="overlay">Loading…</div>

  <script src="driver.js"></script>
</body>
</html>
